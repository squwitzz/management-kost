<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Service Worker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🧹</div>
        <h1>Clear Service Worker</h1>
        <p>Klik tombol di bawah untuk menghapus service worker dan cache. Ini akan memperbaiki masalah loading lambat saat refresh.</p>
        
        <button class="btn-primary" onclick="clearServiceWorker()">
            🗑️ Clear Service Worker & Cache
        </button>
        
        <button class="btn-secondary" onclick="checkStatus()">
            ℹ️ Check Status
        </button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        async function clearServiceWorker() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '⏳ Clearing service worker...';

            try {
                // Unregister all service workers
                const registrations = await navigator.serviceWorker.getRegistrations();
                
                if (registrations.length === 0) {
                    statusDiv.className = 'status info';
                    statusDiv.innerHTML = 'ℹ️ No service workers found.';
                    return;
                }

                for (let registration of registrations) {
                    await registration.unregister();
                }

                // Clear all caches
                const cacheNames = await caches.keys();
                for (let cacheName of cacheNames) {
                    await caches.delete(cacheName);
                }

                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    ✅ Success! Cleared ${registrations.length} service worker(s) and ${cacheNames.length} cache(s).<br><br>
                    <strong>Next steps:</strong><br>
                    1. Close this tab<br>
                    2. Hard refresh your app (Ctrl+Shift+R)<br>
                    3. Loading should be much faster now!
                `;

                // Auto reload after 3 seconds
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';
            statusDiv.className = 'status info';

            try {
                const registrations = await navigator.serviceWorker.getRegistrations();
                const cacheNames = await caches.keys();

                let html = '<strong>Current Status:</strong><br><br>';
                html += `📦 Service Workers: ${registrations.length}<br>`;
                html += `💾 Caches: ${cacheNames.length}<br><br>`;

                if (registrations.length > 0) {
                    html += '<strong>Service Workers:</strong><br>';
                    registrations.forEach((reg, i) => {
                        html += `${i + 1}. ${reg.scope}<br>`;
                    });
                    html += '<br>';
                }

                if (cacheNames.length > 0) {
                    html += '<strong>Caches:</strong><br>';
                    cacheNames.forEach((name, i) => {
                        html += `${i + 1}. ${name}<br>`;
                    });
                }

                statusDiv.innerHTML = html;

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        // Check on load
        window.addEventListener('load', () => {
            if (!('serviceWorker' in navigator)) {
                const statusDiv = document.getElementById('status');
                statusDiv.style.display = 'block';
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Service Workers not supported in this browser.';
            }
        });
    </script>
</body>
</html>
